site_name: Z-GRC App Doc
site_description: Governance, Risk & Compliance platform by Zeb Labs
site_author: Zeb Labs
site_url: https://zeb-ai.github.io/z-grc/

repo_name: zeb-ai/z-grc-application
repo_url: https://github.com/zeb-ai/z-grc-application
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/icon.svg
  favicon: assets/icon.svg

  palette:
    - scheme: slate
      primary: custom
      accent: custom

  font:
    text: Inter
    code: JetBrains Mono

  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow

  icon:
    repo: fontawesome/brands/github
    edit: material/pencil

extra_css:
  - stylesheets/theme.css

extra_javascript:
  - javascripts/external-links.js

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/zeb-ai/z-grc-application

copyright: Copyright &copy; 2026 Zeb Labs

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.keys
  - admonition
  - tables
  - attr_list
  - md_in_html
  - footnotes
  - def_list
  - toc:
      permalink: true
      permalink_title: Copy link to section

plugins:
  - search
  - autorefs

nav:
  - Home: index.md
  - Quick Start:
    - Deploy Application: getting-started/quickstart-application.md
    - Install Package: https://zeb-ai.github.io/z-grc/how-to-use/#1-for-aws-bedrock-model-calls
    - Proxy Server: https://zeb-ai.github.io/z-grc/how-to-use/#2-for-claude-code
  - Deployment:
    - Self-Host Guide: application/deployment.md
