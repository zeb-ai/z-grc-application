# Make sure to update the credential placeholders with your own secrets.
# We mark them with # CHANGEME in the file below.
# Internal services are bound to 127.0.0.1 to only accept connections from the local machine.
# Only governance-ui (port 3000) is publicly accessible.

volumes:
  clickhouse_data:
    driver: local
  clickhouse_logs:
    driver: local
  postgres_data:
    driver: local

networks:
  governance-network:
    driver: bridge

services:
  # ─── PostgreSQL Database ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: governance-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-governance_engine}
      POSTGRES_USER: ${DB_USERNAME:-governance}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-governance_pass_change_me} # CHANGEME
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    networks:
      - governance-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-governance} -d ${DB_NAME:-governance_engine}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ─── ClickHouse for Telemetry Data ─────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:25.3
    container_name: governance-clickhouse
    restart: unless-stopped
    user: "101:101"
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE:-default}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse_password_change_me}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    networks:
      - governance-network
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 1s

  # ─── OpenTelemetry Collector ───────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.1
    container_name: governance-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel/config.yaml"]
    environment:
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:-default}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse_password_change_me}
    depends_on:
      clickhouse:
        condition: service_healthy
    ports:
      - "4317:4317"
      - "4318:4318"
      - "13133:13133"
      - "8888:8888"
    volumes:
      - ./otel-config.yaml:/etc/otel/config.yaml:ro
      - ./logs:/var/log/myapp:ro
    networks:
      - governance-network

  # ─── Governance UI Application ─────────────────────────────────────
  governance-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: governance-ui
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - governance-network