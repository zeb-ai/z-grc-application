networks:
  governance-network:
    driver: bridge

volumes:
  clickhouse_data:
  postgres_data:

services:
  # PostgreSQL Database (default)
  postgres:
    image: postgres:16-alpine
    container_name: governance-postgres
    environment:
      POSTGRES_DB: governance_engine
      POSTGRES_USER: governance
      POSTGRES_PASSWORD: governance_pass_change_me
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"  # Using 5433 on host to avoid conflict
    networks:
      - governance-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U governance -d governance_engine"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ClickHouse for telemetry data
  clickhouse:
    image: clickhouse/clickhouse-server:25.3
    container_name: governance-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - governance-network
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # OpenTelemetry Collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.1
    container_name: governance-otel-collector
    command: ["--config=/etc/otel/config.yaml"]
    depends_on:
      clickhouse:
        condition: service_healthy
    ports:
      - "4317:4317"
      - "4318:4318"
      - "13133:13133"
      - "8888:8888"
    volumes:
      - ./otel-config.yaml:/etc/otel/config.yaml:ro
      - ./logs:/var/log/myapp:ro
    networks:
      - governance-network
    restart: unless-stopped

  # Governance UI Application
  governance-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: governance-ui
    env_file:
      - .env.docker
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - governance-network
    restart: unless-stopped
